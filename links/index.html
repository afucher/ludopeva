<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ludopeva — Links</title>

  <!-- SEO / Social preview -->
  <meta name="description" content="Aluguel de jogos de tabuleiro em Itupeva/SP. Acesse nossos links." />
  <meta property="og:title" content="Ludopeva — Links" />
  <meta property="og:description" content="Aluguel de jogos de tabuleiro em Itupeva/SP." />
  <meta property="og:image" content="https://ludopeva.com.br/logo.png" />
  <meta property="og:url" content="https://ludopeva.com.br/links/" />

  <!-- Meta Pixel Code — carrega apenas após consentimento (LGPD) -->
  <script>
    // Stub seguro: enfileira chamadas fbq() sem erros antes do consentimento
    window.fbq = window.fbq || function () {
      (window.fbq.queue = window.fbq.queue || []).push(arguments);
    };

    function loadMetaPixel() {
      if (window._fbqLoaded) return;
      window._fbqLoaded = true;
      !function (f, b, e, v, n, t, s) {
        n = f.fbq = function () {
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n; n.loaded = !0; n.version = '2.0';
        n.queue = window.fbq.queue || [];
        t = b.createElement(e); t.async = !0;
        t.src = v; s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1109927218013653');
      fbq('track', 'PageView');
    }

    // Visita anterior já consentiu — carrega imediatamente, sem mostrar o banner
    if (localStorage.getItem('cookie_consent') === 'granted') {

    }
  </script>
  <!-- End Meta Pixel Code -->

  <!-- Fonte Nunito (mesma da marca) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset mínimo ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Tokens de marca ── */
    :root {
      --purple: #5B2A86;
      --purple-dk: #4a2070;
      --purple-lt: #7a3db5;
      --orange: #F99B00;
      --white: #FFFFFF;
      --radius: 16px;
      --shadow: 0 6px 24px rgba(0, 0, 0, .18);
    }

    /* ── Base ── */
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100dvh;
      background: linear-gradient(160deg, var(--purple-dk) 0%, var(--purple) 55%, var(--purple-lt) 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 56px;
    }

    /* ── Card central ── */
    .card {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Logo ── */
    .card__logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 50%;
      background: var(--white);
      padding: 10px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    /* ── Handle Instagram ── */
    .card__handle {
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: .02em;
      margin-bottom: 8px;
      opacity: .85;
      transition: opacity .2s;
    }

    .card__handle:hover {
      opacity: 1;
      text-decoration: underline;
    }

    /* ── Slogan ── */
    .card__slogan {
      font-size: .95rem;
      font-weight: 600;
      color: rgba(255, 255, 255, .7);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 32px;
      max-width: 280px;
    }

    /* ── Grupo de botões ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    /* ── Botão base ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 56px;
      padding: 14px 20px;
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      text-decoration: none;
      color: var(--white);
      box-shadow: var(--shadow);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .18);
    }

    @media (hover: hover) {
      .btn:hover {
        filter: brightness(1.08);
        transform: translateY(-2px);
      }
    }

    .btn__icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    /* ── Variantes de cor ── */
    .btn--purple {
      background: var(--white);
      color: var(--purple);
    }

    .btn--outline {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, .7);
      color: var(--white);
    }

    .btn--orange {
      background: var(--orange);
    }

    /* ── Seção de horário ── */
    .schedule {
      width: 100%;
      background: rgba(255, 255, 255, .10);
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: var(--radius);
      padding: 20px 24px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .schedule__title {
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--orange);
      margin-bottom: 14px;
      text-align: center;
    }

    .schedule__row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      font-size: .92rem;
      color: rgba(255, 255, 255, .85);
    }

    .schedule__row+.schedule__row {
      border-top: 1px solid rgba(255, 255, 255, .1);
    }

    .schedule__day {
      font-weight: 600;
    }

    .schedule__time {
      font-weight: 800;
      color: var(--white);
    }

    .schedule__note {
      margin-top: 14px;
      font-size: .78rem;
      color: rgba(255, 255, 255, .55);
      text-align: center;
      line-height: 1.45;
    }

    /* ── Rodapé sutil ── */
    .footer {
      margin-top: 28px;
      font-size: .75rem;
      color: rgba(255, 255, 255, .3);
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="card">

    <!-- Logo -->
    <img src="../logo.png" alt="Logo Ludopeva" class="card__logo" />

    <!-- Instagram -->
    <a href="https://www.instagram.com/ludopeva" target="_blank" rel="noopener noreferrer"
      class="card__handle">@ludopeva</a>

    <!-- Slogan -->
    <p class="card__slogan">
      Diversão em família com jogos de tabuleiro perto de você 🎲
    </p>

    <!-- Botões -->
    <div class="links">

      <a href="https://wa.me/5511936181891" target="_blank" rel="noopener noreferrer" class="btn btn--orange">
        <span class="btn__icon">💬</span>
        Fale conosco
      </a>

      <a href="https://ludopeva.com.br" target="_blank" rel="noopener noreferrer" class="btn btn--purple">
        <span class="btn__icon">🏠</span>
        Conheça o aluguel
      </a>

      <a href="https://ludopeva.lends.com.br" target="_blank" rel="noopener noreferrer" class="btn btn--orange">
        <span class="btn__icon">🎲</span>
        Veja nossos jogos
      </a>

      <a href="https://chat.whatsapp.com/KtrjFOEa83YJlht6HluZ53" target="_blank" rel="noopener noreferrer"
        class="btn btn--outline">
        <span class="btn__icon">📱</span>
        Entre no nosso grupo
      </a>

    </div>

    <!-- Horário de atendimento -->
    <div class="schedule">
      <p class="schedule__title">🕐 Horário de atendimento online</p>

      <div class="schedule__row">
        <span class="schedule__day">Segunda a Domingo</span>
        <span class="schedule__time">09h – 23h</span>
      </div>

      <p class="schedule__note">
        ⚠️ Feriados podem alterar o horário de atendimento.
      </p>
    </div>

    <!-- Rodapé -->
    <p class="footer">© 2026 Ludopeva — Itupeva / SP</p>

  </div>
</body>

</html>
